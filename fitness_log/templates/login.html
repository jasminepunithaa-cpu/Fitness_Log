{% extends "base.html" %}
{% block content %}
<style>
  /* Container styling */
  h2 {
    color: #ff6a00;
    font-weight: 700;
    font-size: 2.8rem;
    margin-bottom: 2rem;
    text-align: center;
    animation: fadeInUp 1s ease forwards;
    user-select: none;
    text-shadow: 0 2px 6px rgba(255,106,0,0.7);
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    max-width: 360px;
    margin: 0 auto;
    animation: fadeInUp 1.2s ease forwards;
    opacity: 0;
  }

  /* Input fields */
  input[type="text"],
  input[type="password"] {
    padding: 1rem 1.2rem;
    font-size: 1.1rem;
    border-radius: 12px;
    border: 2px solid #764ba2;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    box-shadow: inset 0 0 5px rgba(118, 75, 162, 0.7);
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    border-color: #ff6a00;
    box-shadow: 0 0 8px #ff6a00;
    background: rgba(255, 255, 255, 0.15);
  }

  input::placeholder {
    color: #d3cce3;
    font-style: italic;
  }

  /* Login button */
  .btn {
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    color: #fff;
    font-weight: 700;
    font-size: 1.2rem;
    padding: 1rem 0;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow:
      0 0 12px #ff6a00,
      0 0 20px #ee0979,
      0 0 40px #ff6a00;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: pulseGlow 2.5s infinite;
  }

  .btn:hover,
  .btn:focus {
    transform: scale(1.1);
    box-shadow:
      0 0 30px #ff6a00,
      0 0 50px #ee0979,
      0 0 80px #ff6a00,
      0 0 120px #ee0979;
    outline: none;
  }

  .btn:active {
    transform: scale(0.95);
    box-shadow:
      0 0 8px #ff6a00,
      0 0 15px #ee0979;
  }

  /* Animations */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulseGlow {
    0%, 100% {
      box-shadow:
        0 0 12px #ff6a00,
        0 0 20px #ee0979,
        0 0 40px #ff6a00;
    }
    50% {
      box-shadow:
        0 0 28px #ff6a00,
        0 0 45px #ee0979,
        0 0 70px #ff6a00;
    }
  }
</style>

<h2>Login</h2>
<form method="post" novalidate>
  <input type="text" name="username" placeholder="Username" required autocomplete="username" />
  <input type="password" name="password" placeholder="Password" required autocomplete="current-password" />
  <button type="submit" class="btn">Login</button>
</form>
{% endblock %}
