{% extends "base.html" %}
{% block title %}Welcome{% endblock %}
{% block content %}
<style>
  @keyframes zoomEffect {
    0%, 100% {
      transform: scale(1);
      filter: brightness(1);
    }
    50% {
      transform: scale(1.05);
      filter: brightness(1.05);
    }
  }

  body {
    margin: 0;
    padding: 2rem 1rem;
    min-height: 100vh;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
    background: black;

    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    text-align: center;
    position: relative;
    z-index: 0;
  }

  body::before {
    content: '';
    position: fixed; /* changed from absolute to fixed to ensure it fills view on scroll */
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.5)), url('/static/fitness1.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    animation: zoomEffect 18s ease-in-out infinite;
    z-index: -1;
  }

  .content-wrapper {
    background: rgba(0, 0, 0, 0.6);
    padding: 3rem 2rem;
    border-radius: 25px;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.7);
    max-width: 540px;
    width: 100%;
    backdrop-filter: blur(2px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: auto;
  }

  @keyframes fadeUpScale {
    0% {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .fade-in {
    animation: fadeUpScale 1.2s ease forwards;
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 1rem;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  @keyframes fadeSlideIn {
    0% {
      opacity: 0;
      transform: translateY(40px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .slide-up {
    animation: fadeSlideIn 1.6s ease forwards;
    animation-delay: 0.6s;
    opacity: 0;
    font-size: 1.2rem;
    color: #eee;
    margin-bottom: 2rem;
    line-height: 1.6;
    letter-spacing: 0.6px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.4);
    max-width: 420px;
  }

  .btn {
    display: inline-block;
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    color: #fff;
    padding: 1rem 2.5rem;
    border-radius: 60px;
    font-weight: 700;
    font-size: 1.2rem;
    text-decoration: none;
    box-shadow: 0 0 14px #ff6a00, 0 0 24px #ee0979;
    transition: all 0.3s ease;
    opacity: 1;
    animation: slideBounce 2.1s ease forwards;
    animation-delay: 1.2s;
  }

  @keyframes slideBounce {
    0% {
      opacity: 1;
      transform: translateY(60px);
    }
    60% {
      opacity: 1;
      transform: translateY(-12px);
    }
    100% {
      transform: translateY(0);
    }
  }

  .btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #ff6a00, 0 0 50px #ee0979;
  }

  @media (max-width: 480px) {
    .fade-in {
      font-size: 2rem;
    }

    .slide-up {
      font-size: 1rem;
    }

    .btn {
      font-size: 1rem;
      padding: 0.8rem 2rem;
    }
  }
</style>

<div class="content-wrapper">
  <h1 class="fade-in">Welcome to Your Fitness Log</h1>
  <p class="slide-up">Track your diet, workouts, and stay healthy!</p>
  <a href="/login" class="btn">Get Started</a>
</div>
{% endblock %}
