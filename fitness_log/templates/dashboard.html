{% extends "base.html" %}
{% block content %}
<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
    background: url('/static/fitness2.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }

  body::before, body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.3;
    animation: floatBlobs 20s ease-in-out infinite alternate;
    z-index: 0;
  }

  body::before {
    width: 450px;
    height: 450px;
    background: #ff4e50;
    top: 10%;
    left: -150px;
  }

  body::after {
    width: 350px;
    height: 350px;
    background: #f9d423;
    bottom: 15%;
    right: -120px;
    animation-delay: 10s;
  }

  @keyframes floatBlobs {
    0% { transform: translateY(0) translateX(0); }
    100% { transform: translateY(40px) translateX(40px); }
  }

  @keyframes fadeSlideIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  h2 {
    text-align: center;
    font-size: 3.6rem;
    font-weight: 900;
    background: linear-gradient(270deg, #ff4e50, #f9d423, #ff4e50);
    background-size: 600% 600%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientText 10s ease infinite, floatText 6s ease-in-out infinite;
    margin-bottom: 0.5rem;
    user-select: none;
    text-shadow: 0 0 5px #ff4e50, 0 0 20px #f9d423, 0 0 30px #ff4e50;
    position: relative;
    z-index: 1;
    opacity: 0;
    animation-delay: 0.3s;
    animation-fill-mode: forwards;
  }

  @keyframes gradientText {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes floatText {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  ul {
    list-style: none;
    max-width: 480px;
    margin: 0 auto 50px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 1.8rem;
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: fadeSlideIn 1.2s ease forwards;
    animation-delay: 1.1s;
  }

  ul li {
    text-align: center;
  }

  ul li a {
    display: inline-block;
    font-size: 1.45rem;
    font-weight: 700;
    color: #fff;
    padding: 0.8rem 2.2rem;
    border-radius: 60px;
    background: linear-gradient(145deg, #ff4e50, #f9d423);
    box-shadow: 0 4px 15px rgba(255, 78, 80, 0.8), 0 0 25px rgba(249, 212, 35, 0.9);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }

  ul li a:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 30px rgba(249, 212, 35, 1), 0 0 50px rgba(255, 78, 80, 1);
  }

  .animated-link {
    display: inline-block;
    font-size: 28px;
    font-weight: bold;
    color: #ffffff;
    background: linear-gradient(135deg, #26c6da, #00796b);
    padding: 15px 30px;
    border-radius: 30px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    animation: floatUp 1.2s ease-out;
    transition: transform 0.3s, box-shadow 0.3s;
    text-align: center;
    margin-top: 1rem;
  }

  .animated-link:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  @keyframes floatUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tracker-link {
    text-align: center;
  }
</style>

<h2>Hello, {{ username }}</h2>
<p style="text-align:center; color:#eee; font-size:1.6rem; animation: fadeSlideIn 1s ease forwards; animation-delay: 0.6s; opacity: 0;">Select your goal:</p>

<ul>
  <li><a href="/category/weight-loss">Weight Loss</a></li>
  <li><a href="/category/muscle-gain">Muscle Gain</a></li>
  <li><a href="/category/maintenance">Maintenance</a></li>
  <li><a href="/category/body-recomposition">Body Recomposition</a></li>
  <li><a href="/category/Strength-Building">Strength Building</a></li>
  <li><a href="/category/Athletic-performance">Athletic Performance</a></li>
  <li><a href="/category/endurance-training">Endurance Training</a></li>
  <li><a href="/category/lean-bulk">Lean Bulk</a></li>
</ul>

<div class="tracker-link">
  <a href="{{ url_for('nutrition') }}" class="animated-link">Nutrition Tracker</a>
  <br><br>
  <a href="{{ url_for('fitness') }}" class="animated-link" style="background: linear-gradient(135deg, #f06292, #ab47bc);">Fitness Tracker</a>
</div>
{% endblock %}
